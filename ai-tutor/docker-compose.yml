version: "3.9"

services:
  tutor-api:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8091"
    env_file:
      - ./tutor-api/.env.example
    volumes:
      - ./tutor-api:/app
    ports:
      - "8091:8091"

  tutor-web:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev"
    env_file:
      - ./web/.env.example
    environment:
      - TUTOR_API_BASE_URL=http://tutor-api:8091
    volumes:
      - ./web:/app
    ports:
      - "3000:3000"
    depends_on:
      - tutor-api

