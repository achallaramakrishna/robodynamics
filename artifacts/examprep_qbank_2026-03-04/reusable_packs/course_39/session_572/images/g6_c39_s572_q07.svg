<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300"><rect width="440" height="300" fill="#ffffff" stroke="#d1d5db"/><text x="16" y="24" font-size="16" font-family="Arial" fill="#111827">Mensuration Conversions</text><rect x="38" y="80" width="365" height="150" rx="10" fill="#f9fafb" stroke="#9ca3af"/><text x="75" y="125" font-size="15">1 m = 100 cm</text><text x="75" y="160" font-size="15">1 cm = 10 mm</text><text x="75" y="195" font-size="15">1 sq m = 10,000 sq cm</text></svg>