# Nginx routes for RoboDynamics + AI Tutor stack
# Keep existing Java app route as-is and add these location blocks.

location /ai-tutor/ {
    proxy_pass http://127.0.0.1:3000/ai-tutor/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location /api/ai-tutor/ {
    proxy_pass http://127.0.0.1:8080/robodynamics/api/ai-tutor/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# Optional direct route for backend debugging
location /ai-tutor-api/ {
    proxy_pass http://127.0.0.1:8091/ai-tutor-api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

