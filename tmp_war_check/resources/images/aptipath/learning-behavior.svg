<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img" aria-label="Learning behavior visual">
  <defs>
    <linearGradient id="g5" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="300" rx="20" fill="url(#g5)"/>
  <g fill="#ffffff" opacity="0.95">
    <text x="44" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Learning Behavior</text>
    <text x="44" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="20">Consistency, revision loop, and exam stamina habits</text>
    <rect x="44" y="144" width="870" height="114" rx="12" fill="#ffffff" opacity="0.14"/>
    <text x="68" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="23">Strong learners do: plan -> execute -> review -> adjust.</text>
    <text x="68" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="23">After a setback, recover with structure, not panic.</text>
  </g>
</svg>
